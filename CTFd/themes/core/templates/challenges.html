{% extends "base.html" %}

{% block stylesheets %}
  {{ super() }}
  <style>
    body.challenges-page {
      background:
        radial-gradient(circle at 18% 18%, rgba(47, 124, 255, 0.24), transparent 0 28%),
        radial-gradient(circle at 82% 14%, rgba(225, 29, 47, 0.20), transparent 0 24%),
        radial-gradient(circle at 50% 84%, rgba(39, 226, 193, 0.10), transparent 0 32%),
        linear-gradient(180deg, #050811 0%, #070d18 48%, #050811 100%) !important;
      background-color: #050811 !important;
    }

    body.challenges-page::after {
      background:
        radial-gradient(circle at 18% 22%, rgba(47, 124, 255, 0.18), transparent 0 18%, transparent 38%),
        radial-gradient(circle at 80% 20%, rgba(225, 29, 47, 0.16), transparent 0 14%, transparent 34%),
        radial-gradient(circle at 50% 84%, rgba(39, 226, 193, 0.10), transparent 0 16%, transparent 42%);
      filter: blur(14px);
      opacity: 1;
      animation: challenge-aurora 14s ease-in-out infinite alternate;
    }

    [x-cloak] {
      display: none !important;
    }
    body.challenges-page::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 64%);
      background-size: 56px 56px, 56px 56px, 100% 100%;
      opacity: 0.20;
      animation: challenge-grid 18s linear infinite;
      mix-blend-mode: screen;
    }

    .challenge-atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .challenge-atmosphere::before,
    .challenge-atmosphere::after {
      content: "";
      position: absolute;
      inset: -10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 124, 255, 0.20) 0%, rgba(47, 124, 255, 0.08) 22%, transparent 62%);
      filter: blur(28px);
      opacity: 0.55;
      animation: challenge-drift 16s ease-in-out infinite;
    }

    .challenge-atmosphere::after {
      inset: auto -8% -18% auto;
      width: 36vw;
      height: 36vw;
      background: radial-gradient(circle, rgba(225, 29, 47, 0.22) 0%, rgba(225, 29, 47, 0.08) 20%, transparent 66%);
      animation-duration: 20s;
      animation-direction: reverse;
    }

    .challenge-orb {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity: 0.8;
      animation: challenge-float 11s ease-in-out infinite;
    }

    .challenge-orb.one {
      width: 16rem;
      height: 16rem;
      left: 8%;
      top: 12%;
      background: radial-gradient(circle, rgba(47, 124, 255, 0.34), rgba(47, 124, 255, 0.02) 58%, transparent 74%);
      animation-duration: 13s;
    }

    .challenge-orb.two {
      width: 12rem;
      height: 12rem;
      right: 12%;
      top: 18%;
      background: radial-gradient(circle, rgba(225, 29, 47, 0.30), rgba(225, 29, 47, 0.02) 58%, transparent 74%);
      animation-duration: 17s;
      animation-delay: -4s;
    }

    .challenge-orb.three {
      width: 18rem;
      height: 18rem;
      left: 48%;
      bottom: 12%;
      background: radial-gradient(circle, rgba(39, 226, 193, 0.22), rgba(39, 226, 193, 0.02) 56%, transparent 72%);
      animation-duration: 19s;
      animation-delay: -7s;
    }

    .challenge-scanlines {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05), transparent 3px),
        linear-gradient(90deg, transparent, transparent 48%, rgba(255, 255, 255, 0.05) 50%, transparent 52%, transparent);
      background-size: 100% 3px, 120px 100%;
      opacity: 0.06;
      animation: challenge-scan 9s linear infinite;
      transform: translateZ(0);
    }

    body.challenges-page .jumbotron,
    body.challenges-page .container {
      position: relative;
      z-index: 1;
    }

    .challenge-page-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(250px, 0.9fr);
      gap: 1.5rem;
      align-items: center;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding: 1.4rem;
      border: 1px solid rgba(110, 168, 255, 0.16);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(7, 11, 19, 0.80), rgba(8, 13, 23, 0.56));
      backdrop-filter: blur(18px);
      box-shadow: 0 26px 72px rgba(0, 0, 0, 0.40);
    }

    .challenge-page-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(110, 168, 255, 0.20);
      background: rgba(255, 255, 255, 0.04);
      color: #dbe6ff;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .challenge-page-hero h2 {
      margin: 0.7rem 0 0.35rem;
      color: #f4f8ff;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .challenge-page-hero p {
      margin: 0 0 1rem;
      color: #cdd8ee;
      line-height: 1.65;
    }

    .challenge-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .challenge-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(110, 168, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      color: #dfe8fb;
      font-size: 0.9rem;
    }

    .challenge-stat--rank {
      border-color: rgba(225, 29, 47, 0.24);
      background: linear-gradient(135deg, rgba(225, 29, 47, 0.12), rgba(47, 124, 255, 0.08));
      color: #f4f8ff;
    }

    .challenge-page-hero__art {
      position: relative;
      min-height: 220px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(110, 168, 255, 0.16);
      background: rgba(4, 7, 13, 0.7);
    }

    .challenge-page-hero__art::before,
    .challenge-page-hero__art::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .challenge-page-hero__art::before {
      background:
        linear-gradient(135deg, rgba(225, 29, 47, 0.14), transparent 35%, transparent 65%, rgba(47, 124, 255, 0.14)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42));
      mix-blend-mode: screen;
      z-index: 1;
    }

    .challenge-page-hero__art::after {
      background:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.18;
      animation: challenge-grid 18s linear infinite;
      z-index: 2;
    }

    .challenge-page-hero__art-inner {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.10), rgba(0, 0, 0, 0.10)),
        url("https://www.chromethemer.com/wallpapers/chromebook-wallpapers/images/960/spider-man-chromebook-wallpaper.jpg") center/cover no-repeat;
      filter: saturate(1.12) contrast(1.08);
      transform: scale(1.03);
      animation: hero-pan 18s ease-in-out infinite alternate;
    }

    .challenge-button__art {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.35)),
        url("https://www.chromethemer.com/wallpapers/chromebook-wallpapers/images/960/spider-man-chromebook-wallpaper.jpg") center/cover no-repeat;
      opacity: 0;
      transform: scale(1.03);
      filter: saturate(1.08) contrast(1.05);
      transition: opacity 240ms ease, transform 240ms ease, filter 240ms ease;
      animation: challenge-reveal 9s ease-in-out infinite alternate, challenge-shimmer 5.5s ease-in-out infinite alternate;
    }

    .challenge-button.challenge-solved .challenge-button__art {
      opacity: 1;
    }

    .challenge-button.challenge-solved .challenge-inner,
    .challenge-button.challenge-solved .challenge-card-meta {
      position: relative;
      z-index: 1;
    }

    .challenge-button.challenge-solved .challenge-inner p,
    .challenge-button.challenge-solved .challenge-inner span,
    .challenge-button.challenge-solved .challenge-pill {
      color: #f5fbff;
      background-color: rgba(7, 11, 19, 0.62);
      border-color: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .challenge-button.challenge-solved .challenge-pill--solved {
      background: rgba(39, 226, 193, 0.22);
      border-color: rgba(39, 226, 193, 0.45);
    }

    .challenge-button.challenge-solved::before {
      opacity: 1;
      background: linear-gradient(135deg, rgba(39, 226, 193, 0.20), rgba(47, 124, 255, 0.14));
      animation: challenge-solved-glow 3.5s ease-in-out infinite alternate;
    }

    .challenge-button.challenge-solved {
      transform: translateY(-2px) scale(1.01);
      animation: challenge-card-breathe 3.8s ease-in-out infinite alternate;
    }

    .challenge-page-hero__art-badge {
      position: absolute;
      left: 1rem;
      bottom: 1rem;
      z-index: 3;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: rgba(7, 11, 19, 0.82);
      border: 1px solid rgba(110, 168, 255, 0.22);
      color: #f0f5ff;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      backdrop-filter: blur(12px);
    }

    .challenge-page-hero__art-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 2;
      color: #93a4c4;
      text-align: center;
      padding: 1.5rem;
    }

    .challenge-page-hero__art-empty strong {
      display: block;
      color: #f4f8ff;
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .challenge-button {
      position: relative;
      overflow: hidden;
      border-radius: 20px !important;
      background: rgba(8, 12, 20, 0.90) !important;
      border: 1px solid rgba(110, 168, 255, 0.16) !important;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .challenge-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(47, 124, 255, 0.12), rgba(225, 29, 47, 0.10));
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .challenge-button:hover {
      transform: translateY(-2px);
      border-color: rgba(110, 168, 255, 0.36) !important;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.28);
    }

    .challenge-button:hover::before {
      opacity: 1;
    }

    .challenge-button.challenge-solved {
      border-color: rgba(39, 226, 193, 0.40) !important;
      box-shadow: 0 18px 38px rgba(39, 226, 193, 0.10);
    }

    .challenge-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 6.5rem;
      justify-content: center;
      align-items: center;
    }

    .challenge-inner p,
    .challenge-inner span {
      margin: 0;
    }

    .challenge-inner p {
      color: #f4f8ff;
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .challenge-inner span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3.25rem;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: #d7e2f8;
      border: 1px solid rgba(110, 168, 255, 0.14);
      font-weight: 700;
    }

    .challenge-card-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
      margin-top: 0.7rem;
    }

    .challenge-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.38rem 0.65rem;
      border-radius: 999px;
      border: 1px solid rgba(110, 168, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #aebdd8;
      font-size: 0.8rem;
    }

    .challenge-pill--solved {
      border-color: rgba(39, 226, 193, 0.30);
      background: rgba(39, 226, 193, 0.10);
      color: #d7fff5;
    }

    @keyframes challenge-grid {
      from { background-position: 0 0, 0 0, 0 0; }
      to { background-position: 88px 88px, 88px 88px, 0 0; }
    }

    @keyframes challenge-aurora {
      0% { transform: translate3d(-1%, -1%, 0) scale(1); }
      100% { transform: translate3d(1.5%, 1%, 0) scale(1.08); }
    }

    @keyframes challenge-drift {
      0%, 100% { transform: translate3d(-2%, -1%, 0) scale(0.96); }
      50% { transform: translate3d(3%, 2%, 0) scale(1.04); }
    }

    @keyframes challenge-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-14px) scale(1.04); }
    }

    @keyframes challenge-scan {
      from { transform: translateY(-3%); }
      to { transform: translateY(3%); }
    }

    @keyframes hero-pan {
      0% { transform: scale(1.03) translate3d(0, 0, 0); }
      100% { transform: scale(1.08) translate3d(-1.5%, -1%, 0); }
    }


    @keyframes challenge-reveal {
      0% { transform: scale(1.03) translateY(0); }
      100% { transform: scale(1.08) translateY(-2px); }
    }

    @keyframes challenge-solved-glow {
      0% { opacity: 0.78; }
      100% { opacity: 1; }
    }

    @keyframes challenge-shimmer {
      0% { filter: saturate(1.04) contrast(1.02) brightness(0.98); }
      100% { filter: saturate(1.18) contrast(1.08) brightness(1.06); }
    }

    @keyframes challenge-card-breathe {
      0% { box-shadow: 0 18px 38px rgba(39, 226, 193, 0.10); }
      100% { box-shadow: 0 18px 46px rgba(47, 124, 255, 0.18); }
    }

    @media (max-width: 991.98px) {
      .challenge-page-hero {
        grid-template-columns: 1fr;
      }

      .challenge-page-hero__art {
        min-height: 180px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body.challenges-page::before,
      body.challenges-page::after,
      .challenge-atmosphere::before,
      .challenge-atmosphere::after,
      .challenge-orb,
      .challenge-scanlines,
      .challenge-page-hero__art-inner {
        animation: none !important;
      }

      .challenge-button__art,
      .challenge-button.challenge-solved {
        animation: none !important;
      }
    }
  </style>
{% endblock %}

{% block content %}
  <div class="challenge-atmosphere" aria-hidden="true">
    <span class="challenge-orb one"></span>
    <span class="challenge-orb two"></span>
    <span class="challenge-orb three"></span>
    <span class="challenge-scanlines"></span>
  </div>

  <div class="jumbotron">
    <div class="container">
      <h1>
        {% trans %}Challenges{% endtrans %}
      </h1>
    </div>
  </div>

  <div class="container" x-data="ChallengeBoard">
    <div class="row">
      <div class="col-md-12">
        {% include "components/errors.html" %}
      </div>
    </div>

    <template x-if="loaded">
      <section class="challenge-page-hero">
        <div class="challenge-page-hero__copy">
          <span class="challenge-page-hero__eyebrow">Live board</span>
          <h2>Challenge Intel</h2>
          {% if User.place %}
            <p>
              You are currently <strong>#{{ User.place }}</strong> on the scoreboard.
            </p>
          {% else %}
            <p>
              Solve a challenge to reveal your scoreboard position.
            </p>
          {% endif %}
          <p x-show="getTotalSolveCount() > 0" x-cloak>
            Nice work. You have solved <strong x-text="getSolvedChallengeCount()"></strong> challenge<span x-show="getSolvedChallengeCount() !== 1">s</span> so far.
          </p>
          <p x-show="getTotalSolveCount() === 0" x-cloak>
            Pick a target, solve it, and unlock the Spider-Man wallpaper.
          </p>
          <div class="challenge-stats">
            <span class="challenge-stat challenge-stat--rank">
              <i class="fa-solid fa-ranking-star"></i>
              {% if User.place %}
                #{{ User.place }} on the scoreboard
              {% else %}
                Rank pending
              {% endif %}
            </span>
            <span class="challenge-stat">
              <i class="fa-solid fa-trophy"></i>
              <span x-text="getSolvedChallengeCount()"></span> total solved by you
            </span>
            <span class="challenge-stat">
              <i class="fa-solid fa-users"></i>
              <span x-text="getTotalSolveCount()"></span> total solves
            </span>
            <span class="challenge-stat">
              <i class="fa-solid fa-layer-group"></i>
              <span x-text="getCategories().length"></span> categories
            </span>
          </div>
        </div>

        <div class="challenge-page-hero__art">
          <template x-if="getTotalSolveCount() > 0">
            <div class="challenge-page-hero__art-inner" aria-hidden="true" x-transition.opacity.duration.700ms.scale.95></div>
          </template>
          <template x-if="getTotalSolveCount() > 0">
            <div class="challenge-page-hero__art-badge" x-transition.opacity.duration.500ms>
              Wallpaper unlocked
            </div>
          </template>
          <template x-if="getTotalSolveCount() === 0">
            <div class="challenge-page-hero__art-empty">
              <div>
                <strong>Locked visual</strong>
                Solve any challenge to reveal the Spider-Man art.
              </div>
            </div>
          </template>
        </div>
      </section>
    </template>

    <div
      @load-challenges.window="loadChallenges()"
      @load-challenge.window="loadChallenge($event.detail)"
    >
      <div
        x-ref="challengeWindow"
        id="challenge-window"
        class="modal fade"
        tabindex="-1"
        role="dialog"
        x-data=""
        x-html="$store.challenge.data.view"
      ></div>

      <div x-show="!loaded">
        <div class="min-vh-50 d-flex align-items-center">
          <div class="text-center w-100">
            <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
          </div>
        </div>
      </div>

      <div x-show="loaded">
        <template x-for="(category, idx) in getCategories()" :key="idx">
          <div class="pt-5">
            <div class="category-header mb-3">
              <h3 x-text="category"></h3>
            </div>

            <div class="category-challenges d-flex flex-column">
              <div class="challenges-row row">
                <template x-for="(c, idx) in getChallenges(category)" :key="c.id">
                  <div class="col-sm-6 col-md-4 col-lg-3 my-3">
                    <button
                      class="challenge-button btn btn-dark w-100 h-100"
                      :class="[
                        c.solved_by_me ? 'challenge-solved' : '',
                        ...c.tags.map((tag) => `tag-${tag.value.replace(/ /g, '-')}`),
                      ];"
                      :value="c.id"
                      @click="loadChallenge(c.id)"
                    >
                      <div
                        class="challenge-button__art"
                        x-show="c.solved_by_me"
                        x-cloak
                        aria-hidden="true"
                        x-transition.opacity.duration.700ms.scale.92
                      ></div>
                      <div class="challenge-inner my-3">
                        <p x-text="c.name"></p>
                        <span x-text="c.value"></span>
                      </div>

                      <div class="challenge-card-meta">
                        <span class="challenge-pill">
                          <i class="fa-solid fa-users"></i>
                          <span x-text="getChallengeSolveCount(c)"></span> solves
                        </span>
                        <span class="challenge-pill challenge-pill--solved" x-show="c.solved_by_me">
                          <i class="fa-solid fa-circle-check"></i>
                          Solved
                        </span>
                      </div>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/challenges.js") }}
{% endblock %}
